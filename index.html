<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Green Plants | Premium Nursery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Hind Siliguri', sans-serif; }
    .serif-font { font-family: 'Playfair Display', serif; }
    .cart-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .gold-gradient { background: linear-gradient(135deg, #E5BA45 0%, #D4AF37 100%); }
    .gold-gradient:hover { background: linear-gradient(135deg, #D4AF37 0%, #B3922E 100%); }
  </style>
</head>
<body class="bg-[#FDFBF7] text-[#1A3A2B] overflow-x-hidden antialiased">

  <!-- অফার ব্যানার -->
  <div class="bg-[#D4AF37] text-[#1A3A2B] text-xs font-bold py-2 text-center tracking-wide shadow-sm">
    🎉 স্পেশাল অফার: আমাদের থেকে ৩০০০ টাকার কেনাকাটা করলেই পশ্চিমবঙ্গ জুড়ে হোম ডেলিভারি একদম ফ্রি! 🚚
  </div>

  <!-- পেমেন্ট এবং ডেলিভারি ফর্ম মোডাল -->
  <div id="checkout-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 backdrop-blur-sm hidden">
    <div class="bg-white rounded-3xl max-w-xl w-full p-6 md:p-8 shadow-2xl border-t-4 border-[#1A3A2B] relative max-h-[90vh] overflow-y-auto">
      <button onclick="closeCheckout()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-xl font-bold">✕</button>
      <h3 class="serif-font text-2xl font-bold text-[#1A3A2B] mb-1">অর্ডার এবং পেমেন্ট ফর্ম</h3>
      <form id="checkout-form" onsubmit="placeOrder(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">আপনার সম্পূর্ণ নাম</label>
          <input type="text" id="cust-name" placeholder="উদা: রাহুল ব্যানার্জী" class="w-full p-3 border border-gray-200 rounded-xl text-sm" required>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">মোবাইল নম্বর</label>
          <input type="tel" id="cust-phone" placeholder="উদা: +91 XXXXX XXXXX" class="w-full p-3 border border-gray-200 rounded-xl text-sm" required>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">ডেলিভারি ঠিকানা</label>
          <textarea id="cust-address" rows="2" placeholder="আপনার ঠিকানা..." class="w-full p-3 border border-gray-200 rounded-xl text-sm" required></textarea>
        </div>
        <!-- [নতুন] দূরত্ব ইনপুট -->
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">দোকান থেকে আপনার এলাকা কত কিমি দূরে?</label>
          <input type="number" id="cust-distance" placeholder="উদা: 5" class="w-full p-3 border border-gray-200 rounded-xl text-sm" required>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-2">পেমেন্ট পদ্ধতি</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="border rounded-xl p-3 flex items-center gap-3 cursor-pointer">
              <input type="radio" name="payment-method" value="COD" checked> <span>ক্যাশ অন ডেলিভারি</span>
            </label>
            <label class="border rounded-xl p-3 flex items-center gap-3 cursor-pointer">
              <input type="radio" name="payment-method" value="Online"> <span>অনলাইন পেমেন্ট</span>
            </label>
          </div>
        </div>
        <button type="submit" class="w-full gold-gradient text-[#1A3A2B] py-3.5 rounded-xl font-bold text-sm uppercase">✅ অর্ডার কনফার্ম করুন</button>
      </form>
    </div>
  </div>

  <!-- (আপনার বাকি কন্টেন্ট যেমন কার্ট, হেডার, ক্যাটালগ একই থাকবে) -->
  
  <script>
    // [নতুন] ছবি ফিক্স করার ফাংশন
    const getPlaceholder = (category) => {
      const placeholders = {
        'fruits': 'https://images.unsplash.com/photo-1557800636-894a64c1696f?w=500',
        'flowers': 'https://images.unsplash.com/photo-1490750964468-def43015495f?w=500',
        'indoor': 'https://images.unsplash.com/photo-1453906971670-36693a2e3768?w=500',
        'outdoor': 'https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=500'
      };
      return placeholders[category] || 'https://images.unsplash.com/photo-1463936575829-25148e1db1b8?w=500';
    };

    // [পরিবর্তন] renderProducts ফাংশন
    function renderProducts() {
      const container = document.getElementById('catalog-container');
      container.innerHTML = '';
      
      const filteredProducts = currentSelectedCategory === 'all' ? products : products.filter(p => p.category === currentSelectedCategory);

      filteredProducts.forEach(p => {
        const card = document.createElement('div');
        card.className = 'plant-card bg-white rounded-2xl overflow-hidden border border-gray-100 p-4 text-center';
        // এখানে onerror যুক্ত করা হয়েছে
        card.innerHTML = `
          <img src="${p.img}" onerror="this.src='${getPlaceholder(p.category)}';" class="w-full h-48 object-cover rounded-xl mb-2">
          <h3 class="font-bold text-sm">${p.name}</h3>
          <p class="font-bold text-sm">₹ ${p.price}</p>
          <button onclick="handleDirectPurchase('${p.id}', '${p.name}', ${p.price}, '${p.img}')" class="gold-gradient w-full py-2 rounded-xl mt-2 text-xs font-bold">Buy Now</button>
        `;
        container.appendChild(card);
      });
    }

    // [পরিবর্তন] placeOrder ফাংশন
    function placeOrder(e) {
      e.preventDefault();
      
      const distance = parseInt(document.getElementById('cust-distance').value) || 0;
      let deliveryCharge = Math.max(20, distance * 5); // প্রতি কিমি ৫ টাকা, নূন্যতম ২০ টাকা
      
      if (currentCartTotal >= 3000) deliveryCharge = 0; // ৩০০০ এর বেশি হলে ফ্রি
      
      let finalTotal = currentCartTotal + deliveryCharge;
      let deliveryMsg = (deliveryCharge === 0) ? "ফ্রি ডেলিভারি" : `চার্জ: ₹${deliveryCharge} (${distance} কিমি)`;

      // আপনার আগের বাকি লজিকগুলো এখানে বসিয়ে দিন
      const name = document.getElementById('cust-name').value;
      const phone = document.getElementById('cust-phone').value;
      const address = document.getElementById('cust-address').value;
      
      // হোয়াটসঅ্যাপ মেসেজ
      const msg = `*নতুন অর্ডার*\nনাম: ${name}\nমোট বিল: ₹ ${finalTotal} (${deliveryMsg})`;
      // ... হোয়াটসঅ্যাপ বাটন ও মোডাল ক্লোজ করার কোড ...
    }
  </script>
</body>
</html>
