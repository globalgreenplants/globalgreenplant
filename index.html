<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গ্লোবাল গ্রীন প্লান্ট</title>
    <!-- এটি ওয়েবসাইটটিকে সুন্দর ও সাজানো দেখানোর জন্য একটি তৈরি করা ডিজাইনের লিংক -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- এটি বিভিন্ন আইকন (যেমন ফোনের ছবি, সার্চের ছবি) দেখানোর জন্য লিংক -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-stone-50 font-sans">

    <!-- ১. ওয়েবসাইটের নাম ও লোগো (সবার উপরে সুন্দর করে দেখাবে) -->
    <header class="bg-white py-8 shadow-sm text-center">
        <div class="text-green-600 text-6xl mb-3">
            <i class="fas fa-leaf"></i> <!-- একটি সুন্দর পাতার লোগো -->
        </div>
        <h1 class="text-4xl md:text-6xl font-black text-green-800 tracking-wide">
            গ্লোবাল গ্রীন প্লান্ট
        </h1>
        <p class="text-green-600 text-xl mt-2 font-medium">প্রকৃতির সতেজতা, এখন আপনার ঘরে</p>
    </header>

    <!-- ২. সার্চ বার (কোনো কিছু খোঁজার জন্য) -->
    <div class="max-w-md mx-auto px-4 my-6 relative">
        <input type="text" placeholder="আপনার পছন্দের গাছটি খুঁজুন..." class="w-full border-2 border-green-300 rounded-full px-5 py-2.5 focus:outline-none focus:border-green-600 text-base">
        <button class="absolute right-8 top-3.5 text-green-600"><i class="fas fa-search"></i></button>
    </div>

    <!-- ৩. সুন্দর হোম পেজ (একটি বড় সুন্দর ছবি ও বাই বাটন) -->
    <main class="container mx-auto px-4 pb-16">
        <div class="relative rounded-3xl overflow-hidden shadow-xl bg-cover bg-center h-[400px] flex items-center justify-center text-center text-white" 
             style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1463936575829-25148e1db1b8?auto=format&fit=crop&w=1200&q=80');">
            <div class="p-6">
                <h2 class="text-3xl md:text-5xl font-bold mb-4">সেরা মানের গাছপালা কিনুন</h2>
                <p class="text-lg mb-8 max-w-md mx-auto">আমাদের কাছে পাবেন সব ধরণের ইনডোর এবং আউটডোর প্ল্যান্ট।</p>
                <!-- বাই বাটন -->
                <a href="tel:+880123456789" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 px-8 rounded-full text-lg shadow-lg transition">
                     এখনই কিনুন (Buy Now)
                </a>
            </div>
        </div>

        <!-- ৪. রিভিউ সেকশন (কাস্টমাররা কি বলছেন) -->
        <div class="mt-16 max-w-2xl mx-auto">
            <h3 class="text-2xl font-bold text-center text-green-800 mb-6">গ্রাহকদের মতামত (Reviews)</h3>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-green-100 text-center">
                <div class="text-yellow-400 mb-2"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i></div>
                <p class="italic text-gray-600">"খুব সুন্দর গাছ! ডেলিভারি এবং প্যাকেজিং দুটোই দারুণ ছিল।"</p>
                <h4 class="font-bold mt-3 text-green-700">- একজন সন্তুষ্ট ক্রেতা</h4>
            </div>
        </div>
    </main>

    <!-- ৫. ফ্লোটিং কল বাটন (স্ক্রিনের কোণায় সবসময় থাকবে, ক্লিক করলেই কল যাবে) -->
    <a href="tel:+880123456789" class="fixed bottom-6 right-6 bg-green-600 hover:bg-green-700 text-white w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-2xl z-50">
        <i class="fas fa-phone"></i>
    </a>

</body>
</html>
