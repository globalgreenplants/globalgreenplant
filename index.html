<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-10">

  <!-- মেইন ক্যাটালগ সেকশন -->
  <div id="main-catalog" class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- কার্ড ১: আম -->
    <div class="bg-white p-6 rounded-2xl shadow-md text-center">
      <h2 class="text-xl font-bold mb-4">আম গাছ কালেকশন</h2>
      <button onclick="showVarieties('fruits', 'আম গাছ')" class="bg-blue-600 text-white px-6 py-2 rounded-xl">সব ভ্যারাইটি দেখুন</button>
    </div>
    
    <!-- কার্ড ২: জবা -->
    <div class="bg-white p-6 rounded-2xl shadow-md text-center">
      <h2 class="text-xl font-bold mb-4">জবা ফুল কালেকশন</h2>
      <button onclick="showVarieties('flowers', 'জবা ফুল')" class="bg-red-600 text-white px-6 py-2 rounded-xl">সব ভ্যারাইটি দেখুন</button>
    </div>
  </div>

  <!-- ইউনিভার্সাল মোডাল (এটি সবসময় হিডেন থাকবে, ক্লিক করলে বের হবে) -->
  <div id="universal-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-3xl max-w-lg w-full p-6 max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 id="modal-title" class="text-lg font-bold">ভ্যারাইটিসমূহ</h3>
        <button onclick="closeModal()" class="text-2xl font-bold">✕</button>
      </div>
      <div id="modal-grid" class="grid grid-cols-2 gap-4">
        <!-- এখানে ডাটা লোড হবে -->
      </div>
    </div>
  </div>

  <script>
    // ১. আপনার ডাটাবেস (এখানে যত খুশি ভ্যারাইটি যোগ করুন)
    const treeDatabase = {
      'fruits': [
        { name: 'মিয়াজাকি আম', price: 1500 },
        { name: 'হিমসাগর আম', price: 200 },
        { name: 'থাই পেয়ারা', price: 180 }
      ],
      'flowers': [
        { name: 'অস্ট্রেলিয়ান জবা', price: 250 },
        { name: 'সাদা গোলাপ', price: 150 },
        { name: 'পঞ্চমুখী জবা', price: 90 }
      ]
    };

    // ২. মোডাল খোলার ফাংশন
    function showVarieties(category, plantTitle) {
      const modal = document.getElementById('universal-modal');
      const grid = document.getElementById('modal-grid');
      const title = document.getElementById('modal-title');
      
      title.innerText = plantTitle + " - এর ভ্যারাইটি";
      grid.innerHTML = ''; 

      const items = treeDatabase[category] || [];
      
      items.forEach(item => {
        grid.innerHTML += `
          <div class="border p-4 rounded-xl text-center">
            <p class="font-bold text-sm">${item.name}</p>
            <p class="text-green-600 font-bold mb-2">₹${item.price}</p>
            <button class="bg-black text-white w-full py-1 rounded-lg text-xs">কিনুন</button>
          </div>
        `;
      });
      
      modal.classList.remove('hidden');
    }

    // ৩. মোডাল বন্ধ করার ফাংশন
    function closeModal() {
      document.getElementById('universal-modal').classList.add('hidden');
    }
  </script>
</body>
</html>
